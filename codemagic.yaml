workflows:
  ios-build:
    name: iOS Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lingjing-media.app
      vars:
        BUILD_NUMBER: 1
        MARKETING_VERSION: 1.0.0
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Expo Web
        script: npx expo export:web
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Enable IAP capability
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Add :com.apple.InAppPurchase bool true" App/Info.plist 2>/dev/null || echo "IAP key already exists"
      - name: Build iOS app
        script: |
          xcodebuild archive -project ios/App/App.xcodeproj -scheme App -archivePath $HOME/App.xcarchive -allowProvisioningUpdates
          xcodebuild -exportArchive -archivePath $HOME/App.xcarchive -exportPath $HOME -exportOptionsPlist ios/App/exportOptions.plist
    artifacts:
      - $HOME/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      email:
        recipients:
          - postmaster@sumaai.cn